  <script src="/scripts/site-nav.js" defer></script>
  <script>
    (function () {
      const steps = [
        {
          title: '기본 설정 입력',
          description: '계산할 연도·월, 시급, 사업장 규모를 입력합니다.',
          image: '/images/guide/guide-step-1-basic-settings.png',
          alt: '알바BEE 급여계산기 기본 설정 입력 화면'
        },
        {
          title: '근무일 선택',
          description: '출근·퇴근·휴게시간을 입력한 뒤 달력에서 날짜를 클릭하여 근무일을 등록합니다.',
          image: '/images/guide/guide-step-2-work-calendar.png',
          alt: '알바BEE 달력에서 근무일을 선택하는 화면'
        },
        {
          title: '상세정보 확인 및 수정',
          description: '등록된 날짜를 클릭하면 상세정보와 근무시간을 수정할 수 있습니다.',
          image: '/images/guide/guide-step-3-detail-edit.png',
          alt: '선택한 근무일의 상세정보와 근무시간을 수정하는 화면'
        },
        {
          title: '추가 수당 등록',
          description: '식대·교통비·마감수당 등을 추가 등록할 수 있습니다.',
          image: '/images/guide/guide-step-4-extra-pay.png',
          alt: '알바BEE에서 추가 수당을 등록하는 화면'
        },
        {
          title: '법정수당 계산 옵션 설정',
          description: '연장·야간·휴일·주휴수당과 세금 옵션을 설정합니다.',
          image: '/images/guide/guide-step-5-legal-options.png',
          alt: '연장 야간 휴일 주휴수당과 세금 옵션을 설정하는 화면'
        },
        {
          title: '월급 계산 결과 확인',
          description: '총 근무시간과 예상 세후 월급을 확인할 수 있습니다.',
          image: '/images/guide/guide-step-6-salary-result.png',
          alt: '총 근무시간과 예상 세후 월급 계산 결과 화면'
        },
        {
          title: '공유 및 저장',
          description: 'Excel, 링크, 카카오톡으로 계산 결과를 공유할 수 있습니다.',
          image: '/images/guide/guide-step-7-share-export.png',
          alt: '알바BEE 계산 결과를 엑셀 링크 카카오톡으로 공유하는 화면'
        }
      ];

      const buttons = Array.from(document.querySelectorAll('.step-tab'));
      const view = document.querySelector('.step-view');
      const kicker = document.getElementById('guideStepKicker');
      const title = document.getElementById('guideStepTitle');
      const description = document.getElementById('guideStepDescription');
      const image = document.getElementById('guideStepImage');
      const fallback = document.getElementById('guideImageFallback');

      function setStep(index) {
        const step = steps[index] || steps[0];
        buttons.forEach((button, buttonIndex) => {
          const isActive = buttonIndex === index;
          button.classList.toggle('is-active', isActive);
          button.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });

        view.classList.remove('is-visible');
        window.setTimeout(() => {
          kicker.textContent = 'STEP ' + (index + 1);
          title.textContent = step.title;
          description.textContent = step.description;
          fallback.hidden = true;
          image.classList.remove('is-error');
          image.alt = step.alt;
          image.src = step.image;
          view.classList.add('is-visible');
        }, 90);
      }

      image.addEventListener('error', () => {
        image.classList.add('is-error');
        fallback.hidden = false;
      });

      image.addEventListener('load', () => {
        image.classList.remove('is-error');
        fallback.hidden = true;
      });

      buttons.forEach((button) => {
        button.addEventListener('click', () => setStep(Number(button.dataset.step || 0)));
      });

      view.classList.add('is-visible');
      steps.slice(1).forEach((step) => {
        const preloaded = new Image();
        preloaded.src = step.image;
      });
    })();
  </script>
